name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run workspace tests (client/gui/protocol/platform_runtime)
        run: cargo test --locked --workspace --exclude server

      - name: Run server tests
        run: cargo test --locked -p server

      - name: Run clippy on workspace (excluding server)
        run: cargo clippy --locked --workspace --all-targets --exclude server -- -D warnings

      - name: Run clippy on server
        run: cargo clippy --locked -p server --all-targets -- -D warnings

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build full workspace on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --locked --workspace

      - name: Build desktop workspace on macOS and Windows
        if: matrix.os != 'ubuntu-latest'
        run: cargo build --locked -p protocol -p platform_runtime -p client -p gui

      - name: Validate macOS app packaging
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x scripts/package-macos-gui.sh
          ./scripts/package-macos-gui.sh
          /usr/bin/codesign --verify --deep --strict --verbose=2 "target/release/YunDrone BLE Gateway.app"
